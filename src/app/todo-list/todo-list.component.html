<div class="wrapper">
    @for (todo of todos$ | async; track $index) {
        <app-todo-item 
            class="todo-item"
            [item]="todo"
            (onChange)="updateTodo($event)"
            (onDelete)="deleteTodo($event)"
        />
    }
    <button (click)="addTodo()">Add todo</button>
</div>
